    <!-- Hero -->
    <section id="contact-hero" class="centered">
      <div class="contact_hero_title" data-aos="fade-up">

          Got a project? I'd love to hear about it.
        </p>
      </div>
    </section>

    <!-- Centered form + socials -->
    <section id="contact-body" class="centered">
      <div class="contact_centered" data-aos="fade-up">
        <form
          action="https://api.web3forms.com/submit"
          method="POST"
          id="form"
          class="contact_form"
        >
          <input
            type="hidden"
            name="access_key"
            value="c2ce621f-6ba6-49e3-8de9-83795dcf1bcc"
          />
          <input
            type="hidden"
            name="subject"
            value="New Submission from Web3Forms"
          />
          <input type="checkbox" name="botcheck" style="display: none" />

          <label class="form_label" for="name">Name</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Doyoung Kim Gormsen"
            required
            class="form_input"
          />

          <label class="form_label" for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="you@example.com"
            required
            class="form_input"
          />

          <label class="form_label" for="message">Message</label>
          <textarea
            rows="5"
            name="message"
            id="message"
            placeholder="Enter your message"
            required
            class="form_input"
          ></textarea>

          <button
            type="submit"
            class="competencies_btn contact_submit"
            data-cursor="pointer2"
          >
            Send message
          </button>
          <p class="form_result" id="result"></p>
        </form>
      </div>
    </section>

    <script>
      // form

      const form = document.getElementById('form');
      const result = document.getElementById('result');
      if (form) {
        form.addEventListener('submit', function (e) {
          const formData = new FormData(form);
          e.preventDefault();
          var object = {};
          formData.forEach((value, key) => {
            object[key] = value;
          });
          var json = JSON.stringify(object);
          result.innerHTML = 'Please wait...';

          fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: json,
          })
            .then(async (response) => {
              let json = await response.json();
              result.innerHTML = json.message;
              result.classList.remove('success', 'error');
              result.classList.add(
                response.status === 200 ? 'success' : 'error'
              );
            })
            .catch((error) => {
              console.log(error);
              result.innerHTML = 'Something went wrong!';
            })
            .then(function () {
              form.reset();
              setTimeout(() => {
                result.style.display = 'none';
              }, 5000);
            });
        });
      }
    </script>
